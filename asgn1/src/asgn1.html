<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Assignment 1: Painting</title>
  </head>
‹‹
  <body onload="main()">
    <p>Surya Pugazhenthi</p>
    <p>spugazhe@ucsc.edu</p>
    <p>Notes to Grader:</p>
    <p>All required painting functionality is implemented and tested. 
        I added an alpha slider for color transparency (awesomeness).
    </p>

    <canvas id="webgl" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>

    <p>
      Red: <input type="range" id="redSlider" min="0" max="255" value="255">
      Green: <input type="range" id="greenSlider" min="0" max="255" value="0">
      Blue: <input type="range" id="blueSlider" min="0" max="255" value="0">
    </p>

    <p>
      Opacity: <input type="range" id="alphaSlider" min="0" max="100" value="100">
    </p>

    <p>
      Size: <input type="range" id="sizeSlider" min="1" max="50" value="10">
    </p>

    <p>
      Shape:
      <button id="pointBtn">Point</button>
      <button id="triangleBtn">Triangle</button>
      <button id="circleBtn">Circle</button>
    </p>

    <p>
      Circle Segments: <input type="range" id="segmentSlider" min="3" max="50" value="10">
    </p>

    <p>
      <button id="clearButton">Clear Canvas</button>
    </p>

    <img src="sketch.jpg" width="400" alt="My sketch">

    <p>
      <button id="drawPictureBtn">Draw My Picture</button>
    </p>

    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="asgn1.js"></script>
  </body>
</html>
